<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Visual de Redes para Automação</title>
    <style>
        :root {
            /* Paleta de cores ajustada para dar contraste */
            --bg-principal: #121212; /* Fundo geral levemente acinzentado */
            --bg-card: #000000;      /* Cartões em preto puro para destacar */
            --bg-card-hover: #1a1a1a;
            --dourado: #D4AF37;
            --dourado-brilhante: #FFD700;
            --texto-claro: #ffffff;
            --texto-escuro: #cccccc;
            --verde-sucesso: #2e7d32;
            --vermelho-erro: #c62828;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: var(--bg-card);
            border-bottom: 3px solid var(--dourado);
            text-align: center;
            padding: 2.5rem 0;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15); /* Brilho dourado sutil */
        }

        header h1 {
            margin: 0;
            font-size: 2.4rem;
            color: var(--texto-claro);
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--dourado-brilhante);
        }

        /* Abas Principais */
        .tabs {
            display: flex;
            justify-content: center;
            background-color: #1a1a1a;
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            background-color: transparent;
            border: 2px solid var(--dourado);
            color: var(--dourado);
            cursor: pointer;
            padding: 12px 30px;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            margin: 0 10px;
        }

        .tab-btn:hover {
            background-color: rgba(212, 175, 55, 0.15);
            color: var(--dourado-brilhante);
        }

        .tab-btn.active {
            background-color: var(--dourado);
            color: #000; /* Texto preto na aba ativa para leitura fácil */
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
